# fast.yaml - CartoGopher Configuration for GardenDo
# WASP 0.21 + React 19 + TypeScript permaculture property management app

# Path configuration
paths:
  include:
    - "."
  exclude:
    - "vendor/"
    - "node_modules/"
  root: "."

# Paths to ignore during analysis
ignore_paths:
  - "vendor/"
  - "node_modules/"
  - ".git/"
  - ".wasp/"
  - "bakes/"
  - "dist/"
  - "migrations/"

# Language configuration
languages:
  go: false
  html: true
  javascript: true
  typescript: true
  python: false
  rust: false
  terraform: false
  yaml: true
  docker: true

# Size analysis configuration
size_analysis:
  enabled: true

# Performance configuration
performance:
  max_workers: 0
  module_workers: 0
  file_workers: 10
  go_workers: 16
  auto_detect_cpu: true
